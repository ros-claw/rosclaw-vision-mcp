# ROSClaw Vision MCP Configuration
# Copy this file to /etc/rosclaw/vision-mcp.conf or ~/.config/rosclaw/vision-mcp.conf

# Transport mode: stdio or sse
MCP_TRANSPORT=sse

# SSE server settings
MCP_HOST=0.0.0.0
MCP_PORT=8000

# ROS2 Domain ID
ROS_DOMAIN_ID=0

# Camera topic configuration (uncomment and modify if needed)
# ROSCLAW_VISION_COLOR_TOPIC=/camera/camera/color/image_raw
# ROSCLAW_VISION_DEPTH_TOPIC=/camera/camera/aligned_depth_to_color/image_raw
# ROSCLAW_VISION_INFO_TOPIC=/camera/camera/color/camera_info

# YOLO model (optional)
# YOLO_MODEL=yolov8n.pt
